<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Desktop Time</title>
    <style>
        :root {
            --bg-color: #f3f4f6; --text-color: #333333; --text-muted: #555555;
            --card-bg: #ffffff; --card-shadow: rgba(0, 0, 0, 0.05);
            --border-color: #dddddd; --accent-color: #0078D7; --bar-bg: #e5e7eb;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --text-color: #e5e7eb; --text-muted: #9ca3af;
                --card-bg: #1e1e1e; --card-shadow: rgba(0, 0, 0, 0.3);
                --border-color: #333333; --accent-color: #60a5fa; --bar-bg: #374151;
            }
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 40px; }
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px;}
        h1 { margin: 0; }
        .controls input, .controls button { padding: 8px 12px; border-radius: 5px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); cursor: pointer; font-size: 1em; margin-left: 10px;}
        .controls button:hover { background: var(--accent-color); color: white; border-color: var(--accent-color);}
        .total-time { font-size: 1.2em; color: var(--text-muted); margin-bottom: 30px; }
        .grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px var(--card-shadow); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .desktop-name { font-weight: bold; font-size: 1.2em; color: var(--accent-color); }
        .time { font-size: 1.1em; color: var(--text-muted); }
        .progress-container { width: 100%; background-color: var(--bar-bg); border-radius: 4px; height: 12px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; background-color: var(--accent-color); transition: width 0.5s; }
        .percentage { font-size: 0.85em; color: var(--text-muted); float: right; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Desktop Usage</h1>
        <div class="controls">
            <input type="date" id="date-picker">
            <button id="export-btn">Export CSV</button>
        </div>
    </div>
    <div id="total-display" class="total-time">Calculating total time...</div>
    <div id="summary" class="grid">Loading...</div>

    <script>
        let globalData = {}; // Store fetched data
        
        function formatTime(totalSeconds) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            let timeText = "";
            if (hours > 0) timeText += `${hours}h `;
            if (minutes > 0 || hours > 0) timeText += `${minutes}m `;
            timeText += `${seconds}s`;
            return timeText.trim();
        }

        async function fetchAndRenderData() {
            try {
                const response = await fetch('desktop_data.json?t=' + new Date().getTime());
                globalData = await response.json();
                renderData();
            } catch (error) {
                document.getElementById('summary').innerHTML = '<p style="color:#ef4444;">Error loading data.</p>';
            }
        }

        function renderData() {
            const datePicker = document.getElementById('date-picker');
            let selectedDate = datePicker.value;
            
            // If no date selected, default to today
            if (!selectedDate) {
                const d = new Date();
                selectedDate = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
                datePicker.value = selectedDate;
            }

            const dayData = globalData[selectedDate] || {};
            const summaryDiv = document.getElementById('summary');
            const totalDiv = document.getElementById('total-display');
            summaryDiv.innerHTML = ''; 

            if (Object.keys(dayData).length === 0) {
                summaryDiv.innerHTML = `<p>No data recorded for ${selectedDate}.</p>`;
                totalDiv.innerText = "Total Time Tracked: 0s";
                return;
            }

            let totalSecondsOverall = Object.values(dayData).reduce((a, b) => a + b, 0);
            totalDiv.innerText = `Total Time Tracked: ${formatTime(totalSecondsOverall)}`;

            for (const [desktop, seconds] of Object.entries(dayData)) {
                let percentage = totalSecondsOverall > 0 ? ((seconds / totalSecondsOverall) * 100).toFixed(1) : 0;
                summaryDiv.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <span class="desktop-name">${desktop}</span>
                            <span class="time">${formatTime(seconds)}</span>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${percentage}%"></div>
                        </div>
                        <span class="percentage">${percentage}%</span>
                        <div style="clear: both;"></div>
                    </div>`;
            }
        }

        // CSV Export functionality
        document.getElementById('export-btn').addEventListener('click', () => {
            let csvContent = "data:text/csv;charset=utf-8,Date,Desktop,Total Seconds,Formatted Time\n";
            for (const [dateKey, desktops] of Object.entries(globalData)) {
                for (const [desktop, seconds] of Object.entries(desktops)) {
                    csvContent += `${dateKey},${desktop},${seconds},${formatTime(seconds)}\n`;
                }
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "desktop_time_export.csv");
            document.body.appendChild(link);
            link.click();
            link.remove();
        });

        // Event listener for date picker
        document.getElementById('date-picker').addEventListener('change', renderData);

        // Initial fetch and auto-refresh
        fetchAndRenderData();
        setInterval(fetchAndRenderData, 10000);
    </script>
</body>
</html>
