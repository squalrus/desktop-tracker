<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Virtual Desktop Time</title>
    <link rel="icon" type="image/png" href="icon.png" />
    <style>
      :root {
        --bg: #f3f4f6;
        --text: #1f2937;
        --muted: #6b7280;
        --card-bg: #ffffff;
        --shadow: rgba(0,0,0,0.06);
        --border: #e5e7eb;
        --bar-bg: #e5e7eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111827;
          --text: #f3f4f6;
          --muted: #9ca3af;
          --card-bg: #1f2937;
          --shadow: rgba(0,0,0,0.3);
          --border: #374151;
          --bar-bg: #374151;
        }
      }

      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 32px;
      }

      /* Page header */
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 36px;
      }
      h1 { margin: 0; font-size: 1.4em; }
      .controls { display: flex; gap: 8px; align-items: center; }
      .controls input, .controls button {
        padding: 7px 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--card-bg);
        color: var(--text);
        font-size: 0.88em;
        cursor: pointer;
      }
      .controls button:hover { background: #3b82f6; color: #fff; border-color: #3b82f6; }

      /* Sections */
      .view-section { margin-bottom: 44px; }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 2px solid var(--border);
        padding-bottom: 8px;
        margin-bottom: 16px;
      }
      .section-label {
        font-size: 0.7em;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
      }
      .section-sublabel {
        font-size: 0.82em;
        color: var(--muted);
        margin-left: 10px;
        font-weight: normal;
      }
      .section-total { font-size: 0.9em; color: var(--muted); }

      /* Day layout — cards left, donut right */
      .day-body { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; }
      .day-cards {
        flex: 1;
        min-width: 180px;
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        align-content: start;
      }

      /* Week / Month cards */
      .period-cards {
        display: grid;
        gap: 12px;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        margin-bottom: 16px;
      }

      /* Cards */
      .card {
        background: var(--card-bg);
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: 0 1px 3px var(--shadow);
        border-left: 4px solid var(--card-accent, #3b82f6);
      }
      .card-name {
        font-size: 0.78em;
        font-weight: 700;
        color: var(--card-accent, #3b82f6);
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-time {
        font-size: 1.5em;
        font-weight: 700;
        color: var(--text);
        line-height: 1.1;
        margin-bottom: 6px;
      }
      .card-meta { font-size: 0.74em; color: var(--muted); margin-bottom: 9px; }
      .bar-track {
        background: var(--bar-bg);
        border-radius: 3px;
        height: 5px;
        overflow: hidden;
        margin-bottom: 5px;
      }
      .bar-fill {
        height: 100%;
        background: var(--card-accent, #3b82f6);
        border-radius: 3px;
        transition: width 0.4s;
      }
      .card-pct { font-size: 0.72em; color: var(--muted); text-align: right; }

      /* Charts */
      .chart-wrap { margin-top: 4px; }
      .chart-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
        margin-bottom: 8px;
        font-size: 0.76em;
        color: var(--muted);
      }
      .legend-dot {
        display: inline-block;
        width: 8px; height: 8px;
        border-radius: 2px;
        margin-right: 4px;
        vertical-align: middle;
      }
      .no-data { color: var(--muted); font-size: 0.88em; padding: 4px 0; }
    </style>
  </head>
  <body>

    <div class="page-header">
      <h1>Desktop Usage</h1>
      <div class="controls">
        <input type="date" id="date-picker" />
        <button id="export-btn">Export CSV</button>
      </div>
    </div>

    <!-- Day -->
    <div class="view-section">
      <div class="section-header">
        <div>
          <span class="section-label">Day</span>
          <span id="day-sublabel" class="section-sublabel"></span>
        </div>
        <span id="day-total" class="section-total"></span>
      </div>
      <div class="day-body">
        <div class="day-cards" id="day-cards"></div>
        <div id="day-donut"></div>
      </div>
    </div>

    <!-- Week -->
    <div class="view-section">
      <div class="section-header">
        <div>
          <span class="section-label">Week</span>
          <span id="week-sublabel" class="section-sublabel"></span>
        </div>
        <span id="week-total" class="section-total"></span>
      </div>
      <div class="period-cards" id="week-cards"></div>
      <div class="chart-wrap" id="week-chart"></div>
    </div>

    <!-- Month -->
    <div class="view-section">
      <div class="section-header">
        <div>
          <span class="section-label">Month</span>
          <span id="month-sublabel" class="section-sublabel"></span>
        </div>
        <span id="month-total" class="section-total"></span>
      </div>
      <div class="period-cards" id="month-cards"></div>
      <div class="chart-wrap" id="month-chart"></div>
    </div>

    <script>
      const PALETTE = ['#3b82f6','#10b981','#f59e0b','#8b5cf6','#ef4444','#06b6d4','#f97316','#84cc16'];

      let globalData = {};
      let colorMap   = {};

      // Assign a consistent color per desktop name across all sections
      function buildColorMap() {
        const names = new Set();
        for (const d of Object.values(globalData))
          for (const k of Object.keys(d)) names.add(k);
        colorMap = {};
        [...names].sort().forEach((n, i) => colorMap[n] = PALETTE[i % PALETTE.length]);
      }

      function formatTime(s) {
        s = Math.round(s);
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        let t = '';
        if (h > 0) t += h + 'h ';
        if (m > 0 || h > 0) t += m + 'm ';
        t += sec + 's';
        return t.trim();
      }

      function fmtDate(dateStr) {
        return new Date(dateStr + 'T00:00:00')
          .toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      }

      // ── Card ──────────────────────────────────────────────────────────
      function makeCard(desktop, seconds, totalSeconds, metaText) {
        const pct   = totalSeconds > 0 ? ((seconds / totalSeconds) * 100).toFixed(1) : '0.0';
        const color = colorMap[desktop] || PALETTE[0];

        const card = document.createElement('div');
        card.className = 'card';
        card.style.setProperty('--card-accent', color);

        const name = document.createElement('div');
        name.className = 'card-name';
        name.textContent = desktop;

        const time = document.createElement('div');
        time.className = 'card-time';
        time.textContent = formatTime(seconds);

        const track = document.createElement('div');
        track.className = 'bar-track';
        const fill = document.createElement('div');
        fill.className = 'bar-fill';
        fill.style.width = pct + '%';
        track.appendChild(fill);

        const p = document.createElement('div');
        p.className = 'card-pct';
        p.textContent = pct + '%';

        card.appendChild(name);
        card.appendChild(time);
        if (metaText) {
          const meta = document.createElement('div');
          meta.className = 'card-meta';
          meta.textContent = metaText;
          card.appendChild(meta);
        }
        card.appendChild(track);
        card.appendChild(p);
        return card;
      }

      // ── SVG helper ────────────────────────────────────────────────────
      function svgEl(tag, attrs) {
        const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
        for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
        return el;
      }

      // ── Donut chart ───────────────────────────────────────────────────
      // Each ring segment uses stroke-dasharray + stroke-dashoffset.
      // dashoffset = circ/4 − cumulative so segments start at 12 o'clock.
      function renderDonut(container, data) {
        container.innerHTML = '';
        const entries = Object.entries(data).sort(([a],[b]) => a.localeCompare(b));
        const total   = entries.reduce((s,[,v]) => s + v, 0);
        if (total === 0) return;

        const size = 160, cx = 80, cy = 80, r = 54, sw = 20;
        const circ  = 2 * Math.PI * r;

        const svg = svgEl('svg', { viewBox: `0 0 ${size} ${size}` });
        svg.style.cssText = 'width:160px;height:160px;flex-shrink:0';

        svg.appendChild(svgEl('circle', {
          cx, cy, r, fill: 'none', stroke: 'var(--bar-bg)', 'stroke-width': sw
        }));

        let cum = 0;
        for (const [desktop, seconds] of entries) {
          const dash = (seconds / total) * circ;
          const seg  = svgEl('circle', {
            cx, cy, r, fill: 'none',
            stroke: colorMap[desktop] || PALETTE[0],
            'stroke-width': sw,
            'stroke-dasharray': `${dash} ${circ - dash}`,
            'stroke-dashoffset': circ * 0.25 - cum,
          });
          const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
          title.textContent = `${desktop}: ${formatTime(seconds)} (${((seconds/total)*100).toFixed(1)}%)`;
          seg.appendChild(title);
          svg.appendChild(seg);
          cum += dash;
        }

        const tBig = svgEl('text', {
          x: cx, y: cy - 6, 'text-anchor': 'middle',
          fill: 'var(--text)', 'font-size': '13', 'font-weight': 'bold',
          'font-family': 'Segoe UI,sans-serif'
        });
        tBig.textContent = formatTime(total);
        svg.appendChild(tBig);

        const tSub = svgEl('text', {
          x: cx, y: cy + 11, 'text-anchor': 'middle',
          fill: 'var(--muted)', 'font-size': '9', 'font-family': 'Segoe UI,sans-serif'
        });
        tSub.textContent = 'today';
        svg.appendChild(tSub);

        container.appendChild(svg);
      }

      // ── Stacked bar chart ─────────────────────────────────────────────
      // days = [{ label, totals: {desktop: seconds}, isSelected? }]
      function renderBarChart(container, days, compact) {
        container.innerHTML = '';
        const allDesktops = [...new Set(days.flatMap(d => Object.keys(d.totals)))].sort();
        if (allDesktops.length === 0) return;

        const legend = document.createElement('div');
        legend.className = 'chart-legend';
        for (const name of allDesktops) {
          const dot = document.createElement('span');
          dot.className = 'legend-dot';
          dot.style.background = colorMap[name] || PALETTE[0];
          const item = document.createElement('span');
          item.appendChild(dot);
          item.appendChild(document.createTextNode(name));
          legend.appendChild(item);
        }
        container.appendChild(legend);

        const W = 560, H = compact ? 150 : 175;
        const ml = 6, mr = 6, mt = 8, mb = 28;
        const plotW = W - ml - mr, plotH = H - mt - mb;
        const n    = days.length;
        const gap  = n > 20 ? 2 : n > 10 ? 3 : 5;
        const barW = Math.max(4, (plotW - gap * (n - 1)) / n);
        const maxTotal = Math.max(
          ...days.map(d => Object.values(d.totals).reduce((s,v) => s+v, 0)), 1
        );

        const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}` });
        svg.style.cssText = 'width:100%;max-width:560px;display:block';

        // Baseline
        svg.appendChild(svgEl('line', {
          x1: ml, y1: mt + plotH, x2: W - mr, y2: mt + plotH,
          stroke: 'var(--border)', 'stroke-width': 1
        }));

        for (let i = 0; i < n; i++) {
          const { label, totals, isSelected } = days[i];
          const x        = ml + i * (barW + gap);
          const dayTotal = Object.values(totals).reduce((s,v) => s+v, 0);

          if (dayTotal === 0) {
            svg.appendChild(svgEl('rect', {
              x, y: mt + plotH - 2, width: barW, height: 2,
              fill: 'var(--bar-bg)', rx: 1
            }));
          } else {
            let yOff = mt + plotH;
            for (const desktop of Object.keys(totals).sort()) {
              const bh   = (totals[desktop] / maxTotal) * plotH;
              yOff -= bh;
              const rect = svgEl('rect', {
                x, y: yOff, width: barW, height: bh,
                fill: colorMap[desktop] || PALETTE[0], rx: 2
              });
              const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
              title.textContent = `${label} · ${desktop}: ${formatTime(totals[desktop])}`;
              rect.appendChild(title);
              svg.appendChild(rect);
            }
          }

          // Underline the selected day
          if (isSelected) {
            svg.appendChild(svgEl('rect', {
              x, y: mt + plotH + 5, width: barW, height: 3, fill: '#3b82f6', rx: 1
            }));
          }

          const fs = n > 20 ? '7' : '9';
          const t  = svgEl('text', {
            x: x + barW / 2, y: H - 5, 'text-anchor': 'middle',
            'font-size': fs,
            fill: isSelected ? 'var(--text)' : 'var(--muted)',
            'font-weight': isSelected ? 'bold' : 'normal',
            'font-family': 'Segoe UI,sans-serif'
          });
          t.textContent = label;
          svg.appendChild(t);
        }

        container.appendChild(svg);
      }

      // ── Date helpers ──────────────────────────────────────────────────
      function getWeekDays(dateStr) {
        const d   = new Date(dateStr + 'T00:00:00');
        const mon = new Date(d);
        mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
        return Array.from({ length: 7 }, (_, i) => {
          const day = new Date(mon);
          day.setDate(mon.getDate() + i);
          return day.getFullYear() + '-' +
            String(day.getMonth() + 1).padStart(2, '0') + '-' +
            String(day.getDate()).padStart(2, '0');
        });
      }

      function getMonthDays(dateStr) {
        const [y, m] = dateStr.split('-').map(Number);
        const count  = new Date(y, m, 0).getDate();
        return Array.from({ length: count }, (_, i) =>
          `${y}-${String(m).padStart(2,'0')}-${String(i + 1).padStart(2,'0')}`);
      }

      function trackedCount(days) {
        return days.filter(d => {
          const vals = Object.values(globalData[d] || {});
          return vals.length > 0 && vals.reduce((s,x) => s+x, 0) > 0;
        }).length;
      }

      // ── Render: Day ───────────────────────────────────────────────────
      function renderDay(sel) {
        const data  = globalData[sel] || {};
        const total = Object.values(data).reduce((s,v) => s+v, 0);

        document.getElementById('day-sublabel').textContent = fmtDate(sel);
        document.getElementById('day-total').textContent =
          total > 0 ? `Total: ${formatTime(total)}` : '';

        const el = document.getElementById('day-cards');
        el.innerHTML = '';

        if (total === 0) {
          const p = document.createElement('p');
          p.className = 'no-data';
          p.textContent = 'No data recorded for this day.';
          el.appendChild(p);
          document.getElementById('day-donut').innerHTML = '';
          return;
        }

        const frag = document.createDocumentFragment();
        for (const [desktop, secs] of Object.entries(data).sort(([a],[b]) => a.localeCompare(b)))
          frag.appendChild(makeCard(desktop, secs, total, null));
        el.appendChild(frag);
        renderDonut(document.getElementById('day-donut'), data);
      }

      // ── Render: Week ──────────────────────────────────────────────────
      function renderWeek(sel) {
        const days    = getWeekDays(sel);
        const aggData = {};
        for (const d of days)
          for (const [k, v] of Object.entries(globalData[d] || {}))
            aggData[k] = (aggData[k] || 0) + v;

        const total   = Object.values(aggData).reduce((s,v) => s+v, 0);
        const tracked = trackedCount(days);

        document.getElementById('week-sublabel').textContent =
          `${fmtDate(days[0])} – ${fmtDate(days[6])}`;
        document.getElementById('week-total').textContent =
          total > 0 ? `Total: ${formatTime(total)}` : '';

        const el = document.getElementById('week-cards');
        el.innerHTML = '';

        if (total === 0) {
          const p = document.createElement('p');
          p.className = 'no-data';
          p.textContent = 'No data for this week.';
          el.appendChild(p);
          document.getElementById('week-chart').innerHTML = '';
          return;
        }

        const frag = document.createDocumentFragment();
        for (const [desktop, secs] of Object.entries(aggData).sort(([a],[b]) => a.localeCompare(b))) {
          const meta = tracked > 1
            ? `avg/day ${formatTime(Math.round(secs / tracked))} · ${tracked} days`
            : null;
          frag.appendChild(makeCard(desktop, secs, total, meta));
        }
        el.appendChild(frag);

        const LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        renderBarChart(
          document.getElementById('week-chart'),
          days.map((d, i) => ({ label: LABELS[i], totals: globalData[d] || {}, isSelected: d === sel })),
          false
        );
      }

      // ── Render: Month ─────────────────────────────────────────────────
      function renderMonth(sel) {
        const [y, m] = sel.split('-').map(Number);
        const days   = getMonthDays(sel);
        const aggData = {};
        for (const d of days)
          for (const [k, v] of Object.entries(globalData[d] || {}))
            aggData[k] = (aggData[k] || 0) + v;

        const total     = Object.values(aggData).reduce((s,v) => s+v, 0);
        const tracked   = trackedCount(days);
        const monthName = new Date(y, m - 1, 1)
          .toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

        document.getElementById('month-sublabel').textContent = monthName;
        document.getElementById('month-total').textContent =
          total > 0 ? `Total: ${formatTime(total)}` : '';

        const el = document.getElementById('month-cards');
        el.innerHTML = '';

        if (total === 0) {
          const p = document.createElement('p');
          p.className = 'no-data';
          p.textContent = 'No data for this month.';
          el.appendChild(p);
          document.getElementById('month-chart').innerHTML = '';
          return;
        }

        const frag = document.createDocumentFragment();
        for (const [desktop, secs] of Object.entries(aggData).sort(([a],[b]) => a.localeCompare(b))) {
          const meta = tracked > 1
            ? `avg/day ${formatTime(Math.round(secs / tracked))} · ${tracked} days tracked`
            : null;
          frag.appendChild(makeCard(desktop, secs, total, meta));
        }
        el.appendChild(frag);

        renderBarChart(
          document.getElementById('month-chart'),
          days.map(d => ({
            label: String(parseInt(d.split('-')[2])),
            totals: globalData[d] || {},
            isSelected: d === sel
          })),
          true
        );
      }

      // ── Master render ─────────────────────────────────────────────────
      function renderAll() {
        const picker = document.getElementById('date-picker');
        if (!picker.value) {
          const d = new Date();
          picker.value = d.getFullYear() + '-' +
            String(d.getMonth() + 1).padStart(2, '0') + '-' +
            String(d.getDate()).padStart(2, '0');
        }
        buildColorMap();
        renderDay(picker.value);
        renderWeek(picker.value);
        renderMonth(picker.value);
      }

      async function fetchAndRenderData() {
        try {
          const r = await fetch('desktop_data.json?t=' + Date.now());
          globalData = await r.json();
        } catch {
          document.getElementById('day-cards').innerHTML =
            '<p style="color:#ef4444">Error loading data.</p>';
          return;
        }
        renderAll();
      }

      // ── CSV export ────────────────────────────────────────────────────
      function csvEscape(v) {
        const s = String(v);
        return /[,"\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
      }

      document.getElementById('export-btn').addEventListener('click', () => {
        const rows = ['Date,Desktop,Total Seconds,Formatted Time'];
        for (const [date, desktops] of Object.entries(globalData))
          for (const [desktop, secs] of Object.entries(desktops))
            rows.push(`${csvEscape(date)},${csvEscape(desktop)},${secs},${csvEscape(formatTime(secs))}`);
        const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'desktop_time_export.csv';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      });

      document.getElementById('date-picker').addEventListener('change', renderAll);
      fetchAndRenderData();
      setInterval(fetchAndRenderData, 10000);
    </script>
  </body>
</html>
