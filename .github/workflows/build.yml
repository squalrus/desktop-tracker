name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pyvda pystray Pillow

    - name: Build Executable with PyInstaller
      # --noconsole hides the terminal window
      # --onefile packages everything into a single DesktopTracker.exe
      # --icon applies the custom icon to the .exe file itself
      run: |
        pyinstaller --noconsole --onefile --icon=icon.ico --name "DesktopTracker" --collect-all pyvda tracker.py

    - name: Prepare Release Folder
      run: |
        mkdir Release
        copy dist\DesktopTracker.exe Release\
        copy index.html Release\
        copy icon.png Release\
        copy icon.ico Release\
        copy install_autostart.bat Release\

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DesktopTracker-Windows-${{ github.run_number }}
        path: Release\*

    - name: Create GitHub Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: bash
      run: |
        gh release create "build-${{ github.run_number }}" Release/* \
          --title "Build ${{ github.run_number }}" \
          --notes "Automated build from commit ${{ github.sha }}"
